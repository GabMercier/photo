# =============================================================================
# Sveltia CMS Configuration
# =============================================================================
# Bilingual CMS for photography portfolio (EN/FR)
# Fields mirror the Astro content collection schema in src/content.config.ts
# =============================================================================

# --- Backend ---
backend:
  name: github
  repo: GabMercier/photo
  branch: main
  base_url: https://gphoto.pages.dev
  auth_endpoint: /auth

# --- Media ---
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# --- Locale (CMS interface language) ---
locale: "en"

# --- i18n ---
# Content uses nested bilingual fields (title.en, title.fr)
# This matches the Astro content schema

# =============================================================================
# Collections
# =============================================================================
collections:

  # ==========================================================================
  # Posts Collection
  # ==========================================================================
  - name: "posts"
    label: "📷 Posts / Publications"
    label_singular: "Post"
    folder: "src/content/posts"
    create: true
    slug: "{{year}}{{month}}{{day}}{{hour}}{{minute}}{{second}}"
    extension: "md"
    identifier_field: "date"
    summary: "{{date}} — {{title.en}}"
    sortable_fields: ["date", "title.en"]
    thumbnail: "coverImage.src"

    view_filters:
      - label: "🏠 Homepage Carousel"
        field: "homepageCarousel"
        pattern: true
      - label: "⭐ Featured"
        field: "featured"
        pattern: true
      - label: "🔒 Private"
        field: "private"
        pattern: true
      - label: "📚 Series"
        field: "postType"
        pattern: "series"

    fields:
      # --- Cover Image / Image principale (REQUIRED - minimum for a post) ---
      - label: "Cover Image / Image principale"
        name: "coverImage"
        widget: "object"
        fields:
          - label: "Image"
            name: "src"
            widget: "image"
          - label: "Alt Text / Texte alternatif"
            name: "alt"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                required: false
              - label: "🇫🇷 Français"
                name: "fr"
                widget: "string"
                required: false
          - label: "Crop Position / Position de recadrage"
            name: "focalPoint"
            widget: "select"
            required: false
            default: "center"
            hint: "For landscape images: which part to show in portrait view / Pour images paysage: quelle partie afficher en mode portrait"
            options:
              - label: "Left / Gauche"
                value: "left"
              - label: "Center / Centre (Recommended)"
                value: "center"
              - label: "Right / Droite"
                value: "right"

      # --- Secondary Color (next to image for easy picking) ---
      - label: "🎨 Secondary Accent Color / Couleur d'accent secondaire"
        name: "secondaryColor"
        widget: "color"
        required: false
        hint: "Optional accent color for dual-tone glow effects. Pick from your image or choose manually. / Couleur d'accent optionnelle pour effets de lueur bicolore."

      # --- Title / Titre (OPTIONAL) ---
      - label: "Title / Titre"
        name: "title"
        widget: "object"
        required: false
        collapsed: true
        summary: "{{fields.en}}"
        hint: "Optional - if not provided, post displays without title"
        fields:
          - label: "🇬🇧 English"
            name: "en"
            widget: "string"
            required: false
          - label: "🇫🇷 Français"
            name: "fr"
            widget: "string"
            required: false

      # --- Description (for social sharing / SEO) ---
      - label: "Description (Social/SEO)"
        name: "description"
        widget: "object"
        required: false
        collapsed: true
        hint: "Short description for social media sharing (150-200 chars recommended)"
        fields:
          - label: "🇬🇧 English"
            name: "en"
            widget: "text"
            required: false
            hint: "Brief description for social sharing / search results"
          - label: "🇫🇷 Français"
            name: "fr"
            widget: "text"
            required: false
            hint: "Brève description pour le partage social / résultats de recherche"

      # --- Date ---
      - label: "Date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: false

      # --- Additional Images / Images supplémentaires ---
      - label: "Additional Images / Images supplémentaires"
        name: "images"
        widget: "list"
        required: false
        collapsed: true
        label_singular: "Image"
        summary: "Image"
        fields:
          - label: "Image"
            name: "src"
            widget: "image"
          - label: "Alt Text / Texte alternatif"
            name: "alt"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                required: false
              - label: "🇫🇷 Français"
                name: "fr"
                widget: "string"
                required: false
          - label: "Camera / Appareil"
            name: "camera"
            widget: "string"
            required: false
          - label: "Lens / Objectif"
            name: "lens"
            widget: "string"
            required: false
          - label: "Settings / Paramètres"
            name: "settings"
            widget: "string"
            required: false
            hint: "e.g., f/2.8 · 1/500s · ISO 100"

      # --- Classification ---
      - label: "Tags / Étiquettes"
        name: "tags"
        widget: "relation"
        collection: "tags"
        search_fields: ["en", "fr"]
        value_field: "{{slug}}"
        display_fields: ["en"]
        multiple: true
        required: false

      - label: "Post Type / Type"
        name: "postType"
        widget: "select"
        options:
          - label: "Single Image / Image unique"
            value: "single"
          - label: "Series / Série"
            value: "series"
        default: "single"

      # --- Visibility / Visibilité ---
      - label: "Draft / Brouillon"
        name: "draft"
        widget: "boolean"
        default: false
        hint: "Not published / Non publié"

      - label: "Private / Privé"
        name: "private"
        widget: "boolean"
        default: false
        hint: "Protected access / Accès protégé"

      - label: "Featured / En vedette"
        name: "featured"
        widget: "boolean"
        default: false

      # --- Homepage / Page d'accueil ---
      - label: "Show in Carousel / Afficher dans le carrousel"
        name: "homepageCarousel"
        widget: "boolean"
        default: false
        hint: "Display on homepage / Afficher sur la page d'accueil"

      - label: "Default Carousel Slide / Diapositive par défaut"
        name: "homepageDefault"
        widget: "boolean"
        default: false
        hint: "Start carousel here / Commencer le carrousel ici"

      - label: "3D Depth Effect / Effet de profondeur 3D"
        name: "depth3d"
        widget: "boolean"
        default: false
        hint: "Enable parallax depth effect on post page / Activer l'effet de parallaxe sur la page du post"

      # --- Body / Contenu (optional) ---
      - label: "Body / Contenu"
        name: "body"
        widget: "markdown"
        required: false
        hint: "Optional text content / Contenu textuel optionnel"

  # ==========================================================================
  # Tags / Étiquettes
  # ==========================================================================
  - name: "tags"
    label: "🏷️ Tags / Étiquettes"
    label_singular: "Tag / Étiquette"
    folder: "src/data/tags"
    create: true
    slug: "{{slug}}"
    extension: "md"
    identifier_field: "en"
    summary: "{{en}} / {{fr}}"
    fields:
      - label: "🇬🇧 English"
        name: "en"
        widget: "string"
      - label: "🇫🇷 Français"
        name: "fr"
        widget: "string"

  # ==========================================================================
  # About Page / Page À propos
  # ==========================================================================
  - name: "about"
    label: "👤 About / À propos"
    files:
      - name: "about"
        label: "About / À propos"
        file: "src/content/about/about.md"
        fields:
          - label: "Profile Image / Photo de profil"
            name: "profileImage"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - label: "Image"
                name: "src"
                widget: "image"
              - label: "Alt Text / Texte alternatif"
                name: "alt"
                widget: "object"
                required: false
                collapsed: true
                fields:
                  - label: "🇬🇧 English"
                    name: "en"
                    widget: "string"
                    required: false
                  - label: "🇫🇷 Français"
                    name: "fr"
                    widget: "string"
                    required: false

          - label: "Tagline / Slogan"
            name: "tagline"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                required: false
              - label: "🇫🇷 Français"
                name: "fr"
                widget: "string"
                required: false

          - label: "Contact / Coordonnées"
            name: "contact"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - label: "Email"
                name: "email"
                widget: "string"
                required: false
              - label: "Instagram"
                name: "instagram"
                widget: "string"
                required: false
                hint: "Without @ / Sans @"
              - label: "Twitter"
                name: "twitter"
                widget: "string"
                required: false
                hint: "Without @ / Sans @"

          - label: "Bio"
            name: "bio"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - label: "🇬🇧 English"
                name: "en"
                widget: "markdown"
                required: false
              - label: "🇫🇷 Français"
                name: "fr"
                widget: "markdown"
                required: false

