# =============================================================================
# Configuration Sveltia CMS (Français)
# =============================================================================
# CMS bilingue pour portfolio photo (EN/FR)
# Les champs correspondent au schéma Astro dans src/content.config.ts
# =============================================================================

# --- Backend ---
backend:
  name: github
  repo: GabMercier/photo
  branch: main
  base_url: https://gphoto.pages.dev
  auth_endpoint: /auth

# --- Médias ---
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# --- Langue de l'interface ---
locale: "fr"

# =============================================================================
# Collections
# =============================================================================
collections:

  # ==========================================================================
  # Collection des Publications
  # ==========================================================================
  - name: "posts"
    label: "Publications"
    label_singular: "Publication"
    folder: "src/content/posts"
    create: true
    slug: "{{year}}{{month}}{{day}}{{hour}}{{minute}}{{second}}"
    extension: "md"
    identifier_field: "date"
    summary: "{{date}} — {{title.fr}}"
    sortable_fields: ["date", "title.fr"]
    thumbnail: "coverImage.src"
    view_filters:
      - label: "Carrousel d'accueil"
        field: "homepageCarousel"
        pattern: true
      - label: "En vedette"
        field: "featured"
        pattern: true
      - label: "Privé"
        field: "private"
        pattern: true
      - label: "Série"
        field: "postType"
        pattern: "series"

    fields:
      # --- Titre (optionnel, pour l'affichage) ---
      - label: "Titre (optionnel)"
        name: "title"
        widget: "object"
        required: false
        collapsed: true
        preview: false
        summary: "{{fields.fr}}"
        hint: "Optionnel - si non fourni, la publication s'affiche sans titre"
        fields:
          - label: "Français"
            name: "fr"
            widget: "string"
            required: false
          - label: "English"
            name: "en"
            widget: "string"
            required: false

      # --- Image principale ---
      - label: "Image principale"
        name: "coverImage"
        widget: "object"
        fields:
          - label: "Image"
            name: "src"
            widget: "image"
          - label: "Texte alternatif"
            name: "alt"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - label: "Français"
                name: "fr"
                widget: "string"
                required: false
              - label: "English"
                name: "en"
                widget: "string"
                required: false
          - label: "Position de recadrage"
            name: "focalPoint"
            widget: "select"
            required: false
            default: "center"
            hint: "Pour images paysage: quelle partie afficher en mode portrait"
            options:
              - label: "Gauche"
                value: "left"
              - label: "Centre (Recommandé)"
                value: "center"
              - label: "Droite"
                value: "right"

      # --- Couleur de lueur (extraite automatiquement, modifiable) ---
      - label: "Couleur de lueur"
        name: "glowColor"
        widget: "color"
        required: false
        preview: false
        hint: "Extrait de l'image. Modifier au besoin."

      # --- Couleurs secondaires (à côté de l'image pour faciliter le choix) ---
      - label: "Couleurs secondaires"
        name: "secondaryColors"
        widget: "list"
        required: false
        preview: false
        hint: "Couleurs d'accent pour effets de lueur et filtrage. Ajoutez autant que nécessaire."
        field:
          label: "Couleur"
          name: "color"
          widget: "color"

      # --- Description ---
      - label: "Description"
        name: "description"
        widget: "object"
        required: false
        collapsed: true
        preview: false
        fields:
          - label: "Français"
            name: "fr"
            widget: "string"
            required: false
          - label: "English"
            name: "en"
            widget: "string"
            required: false

      # --- Date ---
      - label: "Date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: false
        preview: false

      - label: "Date de prise (EXIF)"
        name: "dateTaken"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: false
        preview: false
        hint: "Rempli automatiquement depuis les données EXIF de la photo. Comparer avec la date de publication."

      # --- Classification ---
      - label: "Étiquettes"
        name: "tags"
        widget: "relation"
        preview: false
        collection: "tags"
        search_fields: ["en", "fr"]
        value_field: "{{slug}}"
        display_fields: ["fr"]
        multiple: true
        required: false

      - label: "Type de publication"
        name: "postType"
        widget: "select"
        preview: false
        options:
          - label: "Image unique"
            value: "single"
          - label: "Série"
            value: "series"
        default: "single"

      - label: "Taille galerie"
        name: "gallerySize"
        widget: "select"
        preview: false
        hint: "Contrôle la taille dans la grille galerie (bureau seulement)"
        options:
          - label: "Auto (détecter du ratio)"
            value: "auto"
          - label: "Petit (1×1)"
            value: "small"
          - label: "Portrait (1×2 haut)"
            value: "portrait"
          - label: "Portrait grand (1×3 très haut)"
            value: "portrait-tall"
          - label: "Paysage (2×1 large)"
            value: "landscape"
          - label: "Vedette (2×2 grand)"
            value: "featured"
        default: "auto"

      # --- Visibilité ---
      - label: "Brouillon"
        name: "draft"
        widget: "boolean"
        default: false
        preview: false
        hint: "Non publié"

      - label: "Privé"
        name: "private"
        widget: "boolean"
        default: false
        preview: false
        hint: "Accès protégé"

      - label: "En vedette"
        name: "featured"
        widget: "boolean"
        default: false
        preview: false

      # --- Page d'accueil ---
      - label: "Afficher dans le carrousel"
        name: "homepageCarousel"
        widget: "boolean"
        default: false
        preview: false
        hint: "Afficher sur la page d'accueil"

      - label: "Diapositive par défaut"
        name: "homepageDefault"
        widget: "boolean"
        default: false
        preview: false
        hint: "Commencer le carrousel ici"

      - label: "Effet de profondeur 3D"
        name: "depth3d"
        widget: "boolean"
        default: false
        preview: false
        hint: "Activer l'effet de parallaxe sur la page du post"

      - label: "Résumé EXIF (auto)"
        name: "exifSummary"
        widget: "string"
        required: false
        preview: false
        hint: "Généré depuis les données EXIF de la photo. Ne pas modifier manuellement."

      - label: "Afficher les données EXIF"
        name: "showExif"
        widget: "boolean"
        default: false
        preview: false
        hint: "Afficher les infos de l'appareil sur la page du post"

      - label: "Champs EXIF"
        name: "exifFields"
        widget: "select"
        multiple: true
        required: false
        preview: false
        default: ["camera", "lens", "focalLength", "aperture", "shutterSpeed", "iso"]
        hint: "Quels champs EXIF afficher (tous par défaut)"
        options:
          - label: "Appareil"
            value: "camera"
          - label: "Objectif"
            value: "lens"
          - label: "Focale"
            value: "focalLength"
          - label: "Ouverture"
            value: "aperture"
          - label: "Vitesse"
            value: "shutterSpeed"
          - label: "ISO"
            value: "iso"
          - label: "Date de prise"
            value: "dateTaken"

      - label: "Remplacements EXIF"
        name: "exifOverrides"
        widget: "object"
        required: false
        collapsed: true
        preview: false
        hint: "Remplacements manuels pour EXIF manquant (ex: objectifs manuels/vintage)"
        fields:
          - label: "Appareil"
            name: "camera"
            widget: "string"
            required: false
          - label: "Objectif"
            name: "lens"
            widget: "string"
            required: false
            hint: "ex: Nikkor 50mm f/1.4 AI-S"
          - label: "Focale"
            name: "focalLength"
            widget: "string"
            required: false
            hint: "ex: 50mm"
          - label: "Ouverture"
            name: "aperture"
            widget: "string"
            required: false
            hint: "ex: f/2.8"
          - label: "Vitesse"
            name: "shutterSpeed"
            widget: "string"
            required: false
            hint: "ex: 1/500"
          - label: "ISO"
            name: "iso"
            widget: "string"
            required: false

      # --- Images supplémentaires ---
      - label: "Images supplémentaires"
        name: "images"
        widget: "list"
        required: false
        collapsed: true
        preview: false
        label_singular: "Image"
        summary: "Image"
        fields:
          - label: "Image"
            name: "src"
            widget: "image"
          - label: "Texte alternatif"
            name: "alt"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - label: "Français"
                name: "fr"
                widget: "string"
                required: false
              - label: "English"
                name: "en"
                widget: "string"
                required: false
          - label: "Appareil photo"
            name: "camera"
            widget: "string"
            required: false
          - label: "Objectif"
            name: "lens"
            widget: "string"
            required: false
            hint: "ex: Nikkor 50mm f/1.4 AI-S"
          - label: "Focale"
            name: "focalLength"
            widget: "string"
            required: false
            hint: "ex: 50mm"
          - label: "Ouverture"
            name: "aperture"
            widget: "string"
            required: false
            hint: "ex: f/2.8"
          - label: "Vitesse"
            name: "shutterSpeed"
            widget: "string"
            required: false
            hint: "ex: 1/500"
          - label: "ISO"
            name: "iso"
            widget: "string"
            required: false

      # --- Contenu (optionnel) ---
      - label: "Contenu"
        name: "body"
        widget: "markdown"
        required: false
        preview: false

  # ==========================================================================
  # Étiquettes
  # ==========================================================================
  - name: "tags"
    label: "Étiquettes"
    label_singular: "Étiquette"
    folder: "src/data/tags"
    create: true
    slug: "{{slug}}"
    extension: "md"
    identifier_field: "en"
    summary: "{{fr}} / {{en}}"
    fields:
      - label: "English"
        name: "en"
        widget: "string"
      - label: "Français"
        name: "fr"
        widget: "string"

  # ==========================================================================
  # Page À propos
  # ==========================================================================
  - name: "about"
    label: "À propos"
    files:
      - name: "about"
        label: "À propos"
        file: "src/content/about/about.md"
        fields:
          - label: "Photo de profil"
            name: "profileImage"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - label: "Image"
                name: "src"
                widget: "image"
              - label: "Texte alternatif"
                name: "alt"
                widget: "object"
                required: false
                collapsed: true
                fields:
                  - label: "Français"
                    name: "fr"
                    widget: "string"
                    required: false
                  - label: "English"
                    name: "en"
                    widget: "string"
                    required: false

          - label: "Slogan"
            name: "tagline"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - label: "Français"
                name: "fr"
                widget: "string"
                required: false
              - label: "English"
                name: "en"
                widget: "string"
                required: false

          - label: "Coordonnées"
            name: "contact"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - label: "Courriel"
                name: "email"
                widget: "string"
                required: false
              - label: "Instagram"
                name: "instagram"
                widget: "string"
                required: false
                hint: "Sans @"
              - label: "Twitter"
                name: "twitter"
                widget: "string"
                required: false
                hint: "Sans @"

          - label: "Biographie"
            name: "bio"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - label: "Français"
                name: "fr"
                widget: "markdown"
                required: false
              - label: "English"
                name: "en"
                widget: "markdown"
                required: false
